<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css?v=2">
    <title>Wholesale B2B Portal</title>

</head>

<body>

    <div id="login-box" class="box">
        <h2>Wholesale Client Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="login-error" style="color: red; font-size: 0.9rem;"></p>
    </div>

    <div id="portal" class="hidden">
        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px;">
            <div>
                <h1 id="welcome-msg">Welcome</h1>
                <p>Your Pricing Tier: <strong id="tier-badge" style="color: #2ecc71;">-</strong></p>
            </div>
            <button onclick="location.reload()"
                style="width: auto; padding: 8px 15px; background-color: #e74c3c;">Logout</button>
        </div>

        <h3>🔍 Search Catalog</h3>
        <div style="display: flex; gap: 10px; background: #eef2f5; padding: 15px; border-radius: 6px;">
            <select id="search-type" style="width: 30%; margin: 0;" onchange="toggleSearchInputs()">
                <option value="name">Search by Product Name</option>
                <option value="id">Search by Product ID</option>
                <option value="category">Select a Category</option>
            </select>

            <input type="text" id="search-query" placeholder="Type name or ID..." style="margin: 0; width: 50%;">

            <input list="categoryOptions" id="categorySearchInput" placeholder="Type to search category... (e.g., Oils)"
                autocomplete="off">

            <datalist id="categoryOptions"></datalist>

            <button onclick="executeSearch()" style="width: 20%; margin: 0; background-color: #34495e;">Search</button>
        </div>

        <h3 style="margin-top: 30px;">📋 Wholesale Rate Sheet</h3>
        <div id="catalog-results"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 15px;">
        </div>


        <div id="admin-section" class="hidden"
            style="margin-top: 40px; border-top: 3px dashed #34495e; padding-top: 20px;">
            <h2 style="color: #34495e;">🛠️ Admin Control Panel</h2>

            <h3>➕ Add New Wholesale Product</h3>
            <div style="background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="admin-sku" placeholder="SKU (e.g., ELEC105)">
                    <input type="text" id="admin-name" placeholder="Product Name">
                    <input type="text" id="admin-category" placeholder="Category">
                    <input type="number" step="0.01" id="admin-small" placeholder="Price for Small Tier ($)">
                    <input type="number" step="0.01" id="admin-medium" placeholder="Price for Medium Tier ($)">
                    <input type="number" step="0.01" id="admin-large" placeholder="Price for Large Tier ($)">
                </div>
                <button onclick="addNewProduct()" style="background-color: #34495e; margin-top: 15px;">Save Product to
                    Database</button>
                <p id="admin-msg" style="font-weight: bold; margin-top: 10px;"></p>
            </div>

            <h3>📋 Master Inventory & Pricing Sheet</h3>
            <div
                style="background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto;">
                <button onclick="loadMasterInventory()"
                    style="background-color: #2980b9; margin-bottom: 15px; width: auto; padding: 10px 20px;">🔄 Refresh
                    Inventory List</button>

                <table border="1" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
                    <thead style="background: #34495e; color: white;">
                        <tr>
                            <th style="padding: 10px;">ID</th>
                            <th style="padding: 10px;">SKU</th>
                            <th style="padding: 10px;">Product Name</th>
                            <th style="padding: 10px;">Category</th>
                            <th style="padding: 10px;">Small Tier ($)</th>
                            <th style="padding: 10px;">Medium Tier ($)</th>
                            <th style="padding: 10px;">Large Tier ($)</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. LOGIN FUNCTIONALITY
        async function handleLogin() {
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;
            const errorTxt = document.getElementById('login-error');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userInp, password: passInp })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorTxt.innerText = data.error || "Login failed";
                    return;
                }

                // Swap screens on success
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');

                if (data.role === 'Customer') {
                    document.getElementById('welcome-msg').innerText = `Welcome, ${data.companyName}!`;
                    document.getElementById('tier-badge').innerText = `${data.segment} Wholesale Tier`;
                } else if (data.role === 'Admin') {
                    document.getElementById('welcome-msg').innerText = `Welcome, Admin!`;
                    document.getElementById('tier-badge').innerText = `Full Control`;
                    document.getElementById('admin-section').classList.remove('hidden');

                    // Auto-load table for admin
                    loadMasterInventory();
                }

            } catch (err) {
                errorTxt.innerText = "Cannot connect to backend server.";
            }
        }

        // 2. TOGGLE INPUTS LAYOUT BASED ON SEARCH TYPE
        function toggleSearchInputs() {
            const type = document.getElementById('search-type').value;
            const textInput = document.getElementById('search-query');
            const categoryDrop = document.getElementById('category-dropdown');

            if (type === 'category') {
                textInput.classList.add('hidden');
                categoryDrop.classList.remove('hidden');
            } else {
                textInput.classList.remove('hidden');
                categoryDrop.classList.add('hidden');
            }
        }

        // 3. CUSTOMER CATALOG SEARCH
        async function executeSearch() {
            const type = document.getElementById('search-type').value;
            const query = (type === 'category') ?
                document.getElementById('category-dropdown').value :
                document.getElementById('search-query').value;

            const resultsContainer = document.getElementById('catalog-results');

            if (type === 'category' && !query) {
                resultsContainer.innerHTML = "<p style='color:orange;'>Please select a valid category from the list.</p>";
                return;
            }

            try {
                const response = await fetch(`/api/products/search?type=${type}&query=${encodeURIComponent(query)}`);
                const products = await response.json();

                if (!products || products.length === 0) {
                    resultsContainer.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; background: #fde8e8; border: 1px solid #f5b7b7; padding: 20px; border-radius: 6px; color: #c0392b;">
                             ⚠️ Product not available. Please check your query or filter parameters.
                        </div>`;
                    return;
                }

                resultsContainer.innerHTML = products.map(prod => `
                    <div style="background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #2ecc71;">
                        <small style="color: #95a5a6; font-weight: bold;">ID: ${prod.productID} | SKU: ${prod.sku}</small>
                        <h4 style="margin: 5px 0 10px 0; color: #2c3e50;">${prod.productName}</h4>
                        <div style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">Category: ${prod.category}</div>
                        <div style="font-size: 1.4rem; color: #27ae60; font-weight: bold;">$${parseFloat(prod.wholesalePrice).toFixed(2)}</div>
                    </div>
                `).join('');

            } catch (err) {
                resultsContainer.innerHTML = "<p style='color:red;'>Error updating catalog data.</p>";
            }
        }

        // 4. ADMIN ADD PRODUCT
        async function addNewProduct() {
            const sku = document.getElementById('admin-sku').value;
            const productName = document.getElementById('admin-name').value;
            const category = document.getElementById('admin-category').value;
            const priceSmall = document.getElementById('admin-small').value;
            const priceMedium = document.getElementById('admin-medium').value;
            const priceLarge = document.getElementById('admin-large').value;
            const msgTxt = document.getElementById('admin-msg');

            try {
                const response = await fetch('/api/admin/add-product', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sku, productName, category, priceSmall, priceMedium, priceLarge })
                });

                const data = await response.json();

                if (!response.ok) {
                    msgTxt.style.color = 'red';
                    msgTxt.innerText = data.error || "Failed to add product.";
                    return;
                }

                msgTxt.style.color = 'green';
                msgTxt.innerText = data.message;

                document.querySelectorAll('#admin-section input').forEach(input => input.value = '');
                loadMasterInventory(); // Automatically refresh the table after adding an item!
            } catch (err) {
                msgTxt.style.color = 'red';
                msgTxt.innerText = "Error connecting to server.";
            }
        }

        // 5. ADMIN LOAD MASTER LEDGER TABLE
        async function loadMasterInventory() {
            const tableBody = document.getElementById('admin-table-body');

            try {
                const response = await fetch('/api/admin/all-products');
                const products = await response.json();

                if (products.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='7' style='padding:10px; text-align:center;'>No products available in the database.</td></tr>";
                    return;
                }

                tableBody.innerHTML = products.map(p => `
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding: 10px; font-weight:bold;">${p.productID}</td>
                        <td style="padding: 10px;">${p.sku}</td>
                        <td style="padding: 10px; font-weight:500;">${p.productName}</td>
                        <td style="padding: 10px; color:#7f8c8d;">${p.category}</td>
                        <td style="padding: 10px; color:#c0392b; font-weight:bold;">$${parseFloat(p.priceSmall).toFixed(2)}</td>
                        <td style="padding: 10px; color:#d35400; font-weight:bold;">$${parseFloat(p.priceMedium).toFixed(2)}</td>
                        <td style="padding: 10px; color:#27ae60; font-weight:bold;">$${parseFloat(p.priceLarge).toFixed(2)}</td>
                    </tr>
                `).join('');

            } catch (err) {
                tableBody.innerHTML = "<tr><td colspan='7' style='padding:10px; text-align:center; color:red;'>Error updating table data.</td></tr>";
            }
        }
        //6. To load the existing categorie in the database
        async function loadSearchableCategories() {
            try {
                // Fetch the unique list from your Aiven backend route
                const response = await fetch('/api/categories');
                const categories = await response.json();

                const datalist = document.getElementById('categoryOptions');

                // Clear old items
                datalist.innerHTML = '';

                // Dynamically add all 500+ entries
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category; // This is what fills the bar when clicked
                    datalist.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading searchable categories:", error);
            }
        }

        // Trigger when the page loads
        window.addEventListener('DOMContentLoaded', loadSearchableCategories);
    </script>
</body>

</html>
